<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

	<body>
		<!--អក្សរដិត​ ធម្មតា -->
		<b>heng html</b><br />
		<!-- ​​​​​​​​​​​​​​​ប្រើសម្រាប់ត្រេត​ តែមានន័យសម្រាប់ screen reader -->

		<em>heng hello</em><br />

		<!-- ​​​​​ i  ប្រើសម្រាប់អក្សរត្រេត  -->

		<i>khmer </i><br />
		​​
		<small>angko wat</small><br />

		<!-- ​​​​​​​​​​​​​​​​​​​អក្សរដិត​ មិនធម្មតា​ មានន័យ -->

		<strong>strong text</strong><br />

		<!-- ប្រើសម្រាប់គណិតវិទ្យា -->

		x<sup>2</sup><br />

		<!-- ប្រើសម្រាប់​គីមី​  -->

		H<sub>2</sub>O<br />

		<!-- បញ្ចូល​អក្សរ -->

		<ins>inserted text </ins><br />

		​​​​​​​​
		<mark>marked text and word</mark><br />

		<del>deleted text</del><br />
