<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>demo Code presentation</title>
    <style>
      body {
        background-color: rgb(243, 246, 243);
        text-align: center;
        border: 10px;
      }

      .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: repeat(1fr);
        border: 50px;
        border-radius: 20px;
        padding: 30px;
      }
      .item1 {
        background-color: chartreuse;
        gap: 10px;
        border: 50px;
        border-radius: 10px;
        padding: 30px;
      }
      .item2 {
        background-color: coral;
        gap: 10px;
        border: 50px;
        border-radius: 10px;
        padding: 30px;
      }
      .item3 {
        background-color: cyan;
        gap: 10px;
        border: 50px;
        border-radius: 10px;
        padding: 30px;
      }
      .item4 {
        background-color: magenta;
        gap: 10px;
        border: 50px;
        border-radius: 10px;
        padding: 30px;
      }
    </style>
  </head>
  <body>
    <div class="grid-container">
      <div class="item1">item 1</div>
      <div class="item2">item 2</div>
      <div class="item3">item 3</div>
      <div class="item4">item 4</div>
    </div>
  </body>
</html>
