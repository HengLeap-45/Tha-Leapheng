<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>My Awesome Website</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				background-color: #f4f4f9;
				margin: 0;
				padding: 0;
			}
			header {
				background: #4caf50;
				color: white;
				padding: 20px;
				text-align: center;
			}
			nav {
				background: #333;
				padding: 10px;
				text-align: center;
			}
			nav a {
				color: white;
				margin: 0 15px;
				text-decoration: none;
			}
			nav a:hover {
				text-decoration: underline;
			}
			section {
				padding: 20px;
			}
			img {
				max-width: 100%;
				height: auto;
				border-radius: 8px;
			}
			button {
				background: #4caf50;
				color: white;
				padding: 10px 20px;
				border: none;
				margin-top: 10px;
				cursor: pointer;
				border-radius: 5px;
			}
			button:hover {
				background: #45a049;
			}
			form {
				margin-top: 20px;
			}
			input,
			textarea {
				width: 100%;
				padding: 10px;
				margin: 8px 0;
				border: 1px solid #ccc;
				border-radius: 5px;
			}
			footer {
				background: #222;
				color: #ccc;
				text-align: center;
				padding: 15px;
				margin-top: 20px;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Welcome to My Awesome Website</h1>
			<p>Learning HTML and CSS step by step</p>
		</header>

		<nav>
			<a href="#home">Home</a>
			<a href="#gallery">Gallery</a>
			<a href="#contact">Contact</a>
		</nav>

		<section id="home">
			<h2>Home</h2>
			<p>This is the homepage. You can add text, images, and buttons here.</p>
			<button onclick="alert('Hello! Thanks for visiting.')">Click Me</button>
		</section>

		<section id="gallery"></section>
			<h2>Gallery</h2>
			<p>Here’s an example image:</p>
			<img src="image copy 3.png" alt="" />
		</section>

		<section id="contact">
			<h2>Contact Me</h2>
			<form>
				<label for="name">Name:</label>
				<input type="text" id="name" placeholder="Your name" />

				<label for="email">Email:</label>
				<input type="email" id="email" placeholder="Your email" />

				<label for="message">Message:</label>
				<textarea[]
					id="message"
					rows="5"
					placeholder="Write your message here"
				></textarea>

				<button type="submit">Send</button>
			</form>
		</section>

		<footer>
			<p>&copy; 2026 My Awesome Website</p>
		</footer>
	</body>
</html>
