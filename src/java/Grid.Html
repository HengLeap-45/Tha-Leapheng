<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Presentation</title>
</head>
<body>

<style>
.container {
  display: grid;
  grid-template-columns: 250px 250px 250px;
  background-color: dodgerblue;
  padding: 10px;
  grid-template-columns: repeat(8, 1fr,1fr);
  grid-template-rows:250px 250px 250px 250px 200px;
}
.container div {
  background-color: #f1f1f1;
  border: 1px solid black;      
  padding: 10px;
  font-size: 30px;
  text-align: center;
}
</style>
</head>
<body>

<div class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
</div>
</body>
</html>
